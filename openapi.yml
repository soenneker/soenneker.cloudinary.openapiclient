          description: Relates the asset to all the assets specified in this array of up to 10 assets, specified by their asset IDs.
          items:
            $ref: '#/components/schemas/asset_id'
          maxItems: 10
          example:
            - fd19f6964b9d377b7ac39752f03d7596

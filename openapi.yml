        sort_by:
          $ref: '#/components/schemas/search_sort_by'
        max_results:
          type: integer
          maximum: 500
          default: 50
          description: Maximum number of folders to return (max 500, default 50).
        next_cursor:
          type: string
          description: When more results are available, use the next_cursor value from the previous response.
    principal_type:
      type: string
      enum:
        - user
        - group
        - apiKey
      description: The type of principal.
    folder_role:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the role.
          example: cld::role::folder::viewer
        name:
          type: string
          description: The human-readable name of the role.
          example: Manager
        description:
          type: string
          description: A summary of the permissions granted by this role.
          example: Editor permissions, plus delete, share, and full download access.
        inherited:
          type: boolean
          description: Indicates whether this role is inherited from an ancestor folder. If false, it's assigned directly to the requested folder.
          example: false
      required:
        - id
        - name
        - description
        - inherited
    folder_role_assignment:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/principal_type'
          example: user
        id:
          type: string
          description: The unique identifier of the principal. For `apiKey`, provide the API key value.
          example: cec735fd65b7d541f35d9f661d130f
        folder_id:
          type: string
          description: The ID of the folder where this role assignment was defined, either the requested folder or one of its ancestor folders.
          example: cd7e9d690a014c68ae8b58f08e090cb03a
        roles:
          type: array
          description: The roles assigned to this principal for this folder.
          items:
            $ref: '#/components/schemas/folder_role'
      required:
        - type
        - id
        - folder_id
        - roles
    permitted_role:
      type: object
      properties:
        id:
          type: string
          description: The role identifier.
          example: cld::role::folder::manager
        name:
          type: string
          description: The human-readable name of the role.
          example: Manager
        description:
          type: string
          description: A description of the role's permissions.
          example: Editor permissions, plus delete, share, and full download access.
      required:
        - id
        - name
        - description
    folder_roles_response:
      type: object
      properties:
        shared_with:
          type: array
          description: An array of principals (users, groups, or API keys) with their role assignments on this folder, including roles inherited from ancestor folders.
          items:
            $ref: '#/components/schemas/folder_role_assignment'
        permitted_roles:
          type: array
          description: The roles the authenticated user can assign on this folder. Users can assign only roles at or below their own permission level for this folder. Returned only when `include_assignable_roles` is true.
          items:
            $ref: '#/components/schemas/permitted_role'
      example:
        shared_with:
          - type: user
            id: cec735fd65b7d541f35d9f661d130f
            folder_id: cd7e9d690a014c68ae8b58f08e090cb03a
            roles:
              - id: cld::role::folder::viewer
                description: View and download public assets.
                name: Viewer
                inherited: false
        permitted_roles:
          - id: cld::role::folder::viewer
            name: Viewer
            description: View and download public assets.
          - id: cld::role::folder::contributor
            name: Contributor
            description: Viewer permissions, plus add assets and create subfolders.
    assign_folder_roles_request:
      type: object
      properties:
        principal:
          type: object
          description: The user, group, or API key whose role assignments are being modified.
          properties:
            type:
              $ref: '#/components/schemas/principal_type'
              example: apiKey
            id:
              type: string
              description: The unique identifier of the principal. For `apiKey`, provide the API key value.
              example: '799451857115779'
          required:
            - type
            - id
        operation:
          type: string
          enum:
            - add
            - remove
          description: The operation to perform on the principal’s role assignments. `add` grants the specified roles; `remove` revokes them.
          example: add
        roles:
          type: array
          description: The role IDs to add or remove.
          items:
            type: string
          maxItems: 10
          example:
            - cld::role::folder::viewer
      required:
        - principal
        - operation
        - roles
      example:
        principal:
          id: '799451857115779'
          type: apiKey
        operation: add
        roles:
          - cld::role::folder::contributor
    DerivedDestroyRequest:
      type: object
      description: Request parameters for deleting derived resources
      properties:
        derived_resource_ids:
          type: array
          items:
            type: string
          description: Array of derived resource IDs to delete specific derived resources
          example:
            - 1234567890abcdef
            - fedcba0987654321
        invalidate:
          type: boolean
          description: Whether to invalidate the CDN cache for the deleted resources
          example: true
      required:
        - derived_resource_ids
    DerivedDestroyResponse:
      type: object
      description: Response for derived resource deletion
      properties:
        deleted:
          type: object
          additionalProperties:
            type: string
            enum:
              - deleted
              - not_found
          description: Map of derived resource IDs to deletion status
          example:
            1234567890abcdef: deleted
            fedcba0987654321: not_found
        unauthorized:
          type: array
          items:
            type: string
          description: Array of derived resource IDs that were not authorized to be deleted
        invalidation:
          type: object
          properties:
            took:
              type: number
              description: Time taken for CDN invalidation in seconds
              example: 25
            urls:
              type: array
              items:
                type: string
              description: Array of URLs that were invalidated
              example:
                - /image/upload/w_100/sample
                - /image/upload/w_200/sample
    search_parameters:
      type: object
      description: Common parameters for resource search operations.
      properties:
        expression:
          type: string
          description: |
            The Lucene-like search expression. Supports token match (`field:value`), exact match (`field=value`), trailing `*` for prefix match, ranges (`[a TO b]`, `{a TO b}`), and comparisons (`>`, `<`, `>=`, `<=`). Combine terms with uppercase `AND`, `OR`, `NOT`, or `+`/`-`, and group with parentheses. Wrap values containing reserved characters (spaces, colons, etc.) in double quotes. See the [search expressions guide](https://cloudinary.com/documentation/search_expressions.md) for the full syntax and supported fields.
          example: resource_type:image AND tags:kitten
          examples:
            - tags:shirt AND uploaded_at>1d
            - resource_type:image AND bytes>1000000 AND (format:png OR format:jpg)
            - folder:products AND context.category:electronics
            - tags:"service:mantels" AND -tags:discontinued
        sort_by:
          $ref: '#/components/schemas/search_sort_by'
        max_results:
          type: integer
          minimum: 0
          maximum: 500
          description: |
            The maximum number of results to return. Default - 50. Maximum - 500.
            Set to `0` to get only `total_count` and `aggregations` without any resources in the response — useful for counting or aggregation-only queries.
          example: 30
        next_cursor:
          type: string
          description: The cursor value to get the next page of results. Available when a previous search returned more results than max_results.
        aggregate:
          description: |
            Fields or ranges to aggregate search results by. Requires a Tier 2 search plan; on Tier 1 the field is accepted but aggregations are omitted from the response.
          oneOf:
            - type: array
              items:
                type: string
                enum:
                  - format
                  - resource_type
                  - type
              description: The fields to aggregate results by. Simple aggregation by field name.
              example:
                - format
                - resource_type
            - type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                    enum:
                      - bytes
                      - image_pixels
                      - video_pixels
                      - duration
                  ranges:
                    type: array
                    description: |
                      One or more ranges for the numeric field. Each range must include a `key` label and at least one of `from` / `to`.
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          minLength: 1
                          maxLength: 20
                          pattern: ^[a-zA-Z0-9_-]+$
                          description: A label for the bucket, returned in the aggregation response. 1–20 chars, alphanumeric plus `-` and `_`.
                          example: small
                        from:
                          type: number
                          description: Start of the range (inclusive). At least one of `from` / `to` is required.
                        to:
                          type: number
                          description: End of the range (exclusive). At least one of `from` / `to` is required.
                      required:
                        - key
                required:
                  - type
                  - ranges
              description: Range-based aggregations for numeric fields
              example:
                - type: bytes
                  ranges:
                    - key: small
                      from: 0
                      to: 10000
                    - key: medium
                      from: 10000
                      to: 100000
        with_field:
          type: array
          items:
            type: string
            enum:
              - context
              - tags
              - image_metadata
              - image_analysis
              - metadata
              - quality_analysis
              - accessibility_analysis
            x-enum-descriptions:
              - Includes the `context` key-value pairs attached to each asset.
              - Includes the list of `tags` attached to each asset.
              - Includes embedded metadata extracted from the asset file (EXIF, IPTC, XMP under `image_metadata`). Tier 2 feature.
              - Includes analysis results such as `colors`, `face_count`, `illustration_score`, and `grayscale` under `image_analysis`. Tier 2 feature.
              - Includes values of structured metadata fields under `metadata`. Tier 2 feature.
              - Includes `quality_analysis.*` scores for assets analyzed at upload time.
              - Includes `accessibility_analysis.*` scores for assets analyzed at upload time.
          description: |
            The additional asset attributes to include in each search result. The `fields` parameter takes precedence over this parameter. `image_metadata`, `image_analysis`, and `metadata` require a Tier 2 search plan.
          example:
            - tags
            - context
        fields:
          type: string
          description: |
            A comma-separated list of fields to include in the response.
            Notes:
            - This parameter takes precedence over the with_field parameter, so if you want any additional asset attributes returned, make sure to also include them in this list (e.g., tags or context).
            - The following fields are always included in the response: public_id, asset_id, asset_folder, created_at, status, type, and resource_type.
          example: tags,context,metadata
    search_response:
      type: object
      description: The response object returned by search operations.
      properties:
        total_count:
          type: integer

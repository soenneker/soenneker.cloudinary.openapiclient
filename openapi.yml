    streaming_profile:
      type: object
      properties:
        external_id:
          type: string
          description: The unique identifier of the streaming profile
          example: f6360c4d-4f62-48b7-b56b-8c49d1bd6dcf
        name:
          type: string
          description: The name of the streaming profile
          example: hd_1080p
        display_name:
          type:
            - string
            - 'null'
          description: The display name of the streaming profile
          example: HD 1080p
        predefined:
          type: boolean
          description: Whether this is a predefined streaming profile
          example: false
        representations:
          type: array
          description: The list of representations in the streaming profile
          items:
            type: object
            properties:
              transformation:
                type: array
                description: The transformation parameters for this representation
                items:
                  type: object
                  additionalProperties: true
          example:
            - transformation:
                - width: 1920
                  height: 1080
                  crop: scale
                  video_codec: h264
                  bit_rate: 2500k
                  audio_codec: aac
                  audio_bitrate: 128k
                  fps: 30
            - transformation:
                - width: 1280
                  height: 720
                  crop: scale
                  video_codec: h264
                  bit_rate: 1500k
                  audio_codec: aac
                  audio_bitrate: 128k
                  fps: 30
      required:
        - external_id
        - name
        - predefined
      example:
        external_id: sp_123456789
        name: hd_1080p
        display_name: HD 1080p
        predefined: false
        representations:
          - transformation:
              - width: 1920
                height: 1080
                crop: scale
                video_codec: h264
                bit_rate: 2500k
                audio_codec: aac
                audio_bitrate: 128k
                fps: 30
          - transformation:
              - width: 1280
                height: 720
                crop: scale
                video_codec: h264
                bit_rate: 1500k
                audio_codec: aac
                audio_bitrate: 128k
                fps: 30
    streaming_profile_list_response:

            - rejected_ids
            - invalid_ids
            - internal_error_ids
            - non_existing_ids
            - invalid_relate_to_self_id
            - already_exists_ids
            - relation_does_not_exist_ids
            - success_ids
          example: success_ids
          description: The code indicating the result of the operation.
        asset:
          type: string
          example: fd19f6964b9d377b7ac39752f03d7596

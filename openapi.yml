openapi: 3.1.0
info:
  title: Cloudinary API v1.1
  version: 0.5.1
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Cloudinary Support
    email: support@cloudinary.com
    url: https://support.cloudinary.com
  termsOfService: https://cloudinary.com/tou
servers:
  - url: https://{region}.cloudinary.com
    description: Regional API endpoints for optimal performance.
    variables:
      region:
        default: api
        description: Regional endpoint selection
        enum:
          - api
          - api-eu
          - api-ap
  - url: https://{host}
    description: Custom domains for enterprise deployments.
    variables:
      host:
        default: api.cloudinary.com
        description: API host domain.
security:
  - basicAuth: []
  - oauth2:
      - asset_management
      - upload
tags:
  - name: upload
    description: Uploads files to the active product environment.
  - name: upload_presets
    description: Enables you to manage upload presets.
  - name: metadata_fields
    description: Enables you to manage structured metadata fields.
  - name: metadata_rules
    description: Enables you to set up dependencies and relationships between structured metadata fields and options.
  - name: upload_mappings
    description: Enables you to manage upload mappings
  - name: assets
    description: Enables you to manage all the resources (assets) stored in your product environment.
  - name: asset_relations
    description: Enables you to manage relationships between assets.
  - name: metadata
    description: Enables you to manage the custom metadata (tags/context/structured metadata) stored with specific assets.
  - name: moderations
    description: Enables you to manage moderation definitions.
  - name: streaming_profiles
    description: Enables you to manage streaming profiles
  - name: video_analytics
    description: Gets video analytics
  - name: transformations
    description: Enables you to manage named and unnamed transformations.
  - name: triggers
    description: Enables you to manage event triggers and notifications.
  - name: explode
    description: Generates derived images from a multi-frame/page file.
  - name: tags
    description: Enables you to manage the tags used in your product environment.
  - name: backups
    description: Enables you to manage backup versions.
  - name: folders
    description: Enables you to manage the asset folders in your product environment.
  - name: usage
    description: Gets usage details
  - name: search
    description: APIs for searching resources using text and visual search capabilities
  - name: people
    description: APIs for accessing and managing face recognition results.
paths:
  /v1_1/{cloud_name}/{resource_type}/upload:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/upload_resource_type'
    post:
      operationId: upload
      summary: Uploads media assets (images, videos, raw files) to your Cloudinary product environment
      description: |
        Uploads media assets (images, videos, raw files) to your Cloudinary product environment. The file is securely stored
        in the cloud with backup and revision history. Cloudinary automatically analyzes and saves important data about each
        asset, such as format, size, resolution, and prominent colors, which is indexed to enable searching on those attributes.

        Supports uploading from:
        - Local file paths (SDKs/MCP server only). For MCP server path MUST start with file://
        - Remote HTTP/HTTPS URLs
        - Base64 Data URIs (max ~60 MB)
        - Private storage buckets (S3 or Google Storage)
        - FTP addresses

        The uploaded asset is immediately available for transformation and delivery upon successful upload.

        Transform media files using transformation syntax in delivery URLs, which creates derived files accessible immediately without re-uploading the original.
      tags:
        - upload
      x-speakeasy-mcp:
        name: upload-asset
        scopes:
          - librarian
          - builder
        title: Upload Asset
      requestBody:
        $ref: '#/components/requestBodies/upload_request_body'
      responses:
        '200':
          description: Successful upload
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/upload_response'
                  - $ref: '#/components/schemas/async_upload_response'
        '302':
          description: Redirect to callback URL (when 'callback' parameter is provided and request is not XHR).
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/html_redirect'
        '400':
          description: Bad request (e.g., missing parameters, invalid type, target exists without overwrite)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Not allowed (e.g., insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Asset not found (e.g. when uploading from a remote URL that does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/upload:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
    post:
      operationId: uploadNoResourceType
      summary: Upload with automatic file type detection
      description: Uploads a file to Cloudinary. The file type is automatically detected based on its content, so you don't need to specify the type manually.
      tags:
        - upload
      x-speakeasy-mcp:
        disabled: true
      requestBody:
        $ref: '#/components/requestBodies/upload_request_body'
      responses:
        '200':
          description: Successful upload
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/upload_response'
                  - $ref: '#/components/schemas/async_upload_response'
        '302':
          description: Redirect to callback URL (when 'callback' parameter is provided and request is not XHR).
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/html_redirect'
        '400':
          description: Bad request (e.g., missing parameters, invalid type, target exists without overwrite)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Not allowed (e.g., insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Asset not found (e.g. when uploading from a remote URL that does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/upload_chunked:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/upload_resource_type'
    post:
      operationId: uploadChunk
      summary: Upload a single chunk of a large file
      description: |
        Uploads a single chunk of a large file as part of a chunked upload process. This enables efficient upload of
        large files with the ability to resume interrupted uploads. Each request uploads one chunk of the file.
        It is required for any files that are larger than 100 MB. This is often relevant for video files, as they
        tend to have larger file sizes. Minimum chunk size is 5 MB.
      tags:
        - upload
      x-speakeasy-mcp:
        disabled: true
        scopes:
          - librarian
      parameters:
        - name: Content-Range
          in: header
          required: true
          schema:
            type: string
          description: The range of bytes being uploaded in the current chunk, in the format "bytes start-end/total". For example, "bytes 0-999999/3000000" indicates the first 1MB chunk of a 3MB file.
          example: bytes 0-999999/3000000
        - name: X-Unique-Upload-Id
          in: header
          required: true
          schema:
            type: string
          description: A unique identifier for the upload. Must be the same for all chunks of the same file.
          example: 2fd4e1c67a2d28fce
      requestBody:
        $ref: '#/components/requestBodies/upload_request_body'
      responses:
        '200':
          description: Chunk upload successful. For all but the final chunk, this returns upload status. For the final chunk, it returns the complete upload response.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/non_final_chunk_upload_response'
                  - $ref: '#/components/schemas/upload_response'
                  - $ref: '#/components/schemas/async_upload_response'
        '302':
          description: Redirect to callback URL (when 'callback' parameter is provided and request is not XHR).
          content:
            text/html:
              schema:
                $ref: '#/components/schemas/html_redirect'
        '400':
          description: Bad request (e.g., invalid Content-Range format, or chunk size below minimum)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Not allowed (e.g., insufficient permissions)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/rename:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/resource_type'
    post:
      x-speakeasy-mcp:
        name: asset-rename
        scopes:
          - librarian
        title: Asset Rename
        idempotentHint: true
      summary: Updates an existing asset's identifier (public ID) and optionally other metadata in your Cloudinary account
      tags:
        - assets
      operationId: renameAsset
      requestBody:
        description: The rename request parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/rename_request'
      responses:
        '200':
          description: Asset renamed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/upload_response'
        '400':
          description: Bad request (e.g., missing parameters, invalid type, target exists without overwrite)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Source asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/download:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/resource_type'
    get:
      x-speakeasy-mcp:
        name: download-asset
        disabled: true
        scopes:
          - admin
      summary: Generates a download link for a specific asset (image)
      tags:
        - assets
      operationId: downloadAsset
      parameters:
        - $ref: '#/components/parameters/public_id_query'
        - name: format
          in: query
          required: false
          schema:
            type: string
          description: The format to convert the asset to before downloading.
        - $ref: '#/components/parameters/delivery_type_query'
        - name: expires_at
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Unix timestamp indicating when the download URL should expire.
        - name: attachment
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Whether to force download as an attachment.
        - name: target_filename
          in: query
          required: false
          schema:
            type: string
          description: The desired filename for the downloaded file.
        - name: transformation
          in: query
          required: false
          schema:
            type: string
          description: A transformation to apply to the asset before downloading.
        - $ref: '#/components/parameters/api_key_query'
        - $ref: '#/components/parameters/signature_query'
        - $ref: '#/components/parameters/timestamp_query'
      responses:
        '200':
          description: Asset downloaded successfully
          content:
            image/*:
              schema:
                type: string
                format: binary
            video/*:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request (e.g., missing parameters, invalid format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Forbidden (e.g., insufficient permissions for private assets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/destroy:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/resource_type'
    post:
      operationId: destroyAsset
      summary: Destroys an asset/resource
      tags:
        - upload
      requestBody:
        description: The asset to destroy and related options.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/destroy_request'
      responses:
        '200':
          description: Asset/resource destroyed successfully or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/destroy_response'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Asset/resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/explode:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - name: resource_type
        in: path
        required: true
        schema:
          type: string
          enum:
            - image
        description: The type of resource to explode. Only "image" is supported.
    post:
      summary: Create derived images from multi-page file
      description: Generates derived images for each of the individual pages/frames in a multi-page/frame file (such as a PDF or animated image).
      tags:
        - explode
      operationId: explodeResource
      requestBody:
        description: The explode operation parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/explode_request'
      responses:
        '200':
          description: Explode operation started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/explode_response'
        '400':
          description: Bad request (e.g., missing pg_all parameter, invalid transformation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/explicit:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/resource_type'
    post:
      summary: Apply operations on an existing asset
      description: |
        Applies actions such as transformations, tags, or metadata updates to an existing asset without re-uploading it.
        This is useful for applying new transformations, adding tags, or updating metadata on assets that are already in your cloud.

        Note: Always prefer delivery URL transformations over this method, unless eager transformations are specifically required.
      tags:
        - assets
      operationId: explicitAsset
      requestBody:
        description: The asset and operations to apply.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/explicit_request'
      responses:
        '200':
          description: Operations applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/upload_response'
        '400':
          description: Bad request (e.g., missing parameters, invalid type)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Forbidden (e.g., insufficient permissions for private assets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '404':
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/generate_archive:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - $ref: '#/components/parameters/archive_resource_type'
    post:
      x-speakeasy-mcp:
        name: generate-archive
        scopes:
          - librarian
        title: Generate Archive
      summary: Creates an archive (ZIP or TGZ file) that contains a set of assets from your product environment.
      description: Creates a downloadable ZIP or other archive format containing the specified resources.
      tags:
        - assets
      operationId: generateArchive
      requestBody:
        description: The archive generation parameters.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/generate_archive_request'
      responses:
        '200':
          description: Archive successfully generated or downloaded
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                $ref: '#/components/schemas/generate_archive_response'
              example:
                asset_id: 3cd9f196fe3ee1882c0f66223bc568f9
                public_id: atufggsrkjjefdsy90nr.zip
                version: 1747234673
                version_id: 42f240f70d86aab6e9249fe5b664c237
                signature: 689ea4a513604414f44f0d779fc7d049bbdad6d2
                resource_type: raw
                created_at: '2025-05-14T14:57:53Z'
                tags: []
                bytes: 3574651
                type: upload
                etag: 47ac8d2c1b74ac107937d6e9181dd047
                placeholder: false
                url: http://res.cloudinary.com/customerafdb058c4adc/raw/upload/v1747234673/atufggsrkjjefdsy90nr.zip
                secure_url: https://res.cloudinary.com/customerafdb058c4adc/raw/upload/v1747234673/atufggsrkjjefdsy90nr.zip
                asset_folder: ''
                display_name: koetjd3qrme0cfcfnjet.zip
                resource_count: 6
                file_count: 6
        '400':
          description: Bad request (e.g., missing parameters, invalid format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/download_backup:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
    get:
      x-speakeasy-mcp:
        name: download-asset-backup
        scope:
          - advanced_librarian
        title: Download Asset Backup
        readOnlyHint: true
        idempotentHint: true
      summary: Download a backup copy of an asset
      tags:
        - assets
      operationId: downloadBackupAsset
      parameters:
        - $ref: '#/components/parameters/asset_id_query'
        - name: version_id
          in: query
          required: true
          schema:
            type: string
            pattern: ^[0-9a-f]{32}$
          description: The version ID of the backup to download. Must be a 32-character hexadecimal string.
          example: a3978316b0045e5eaf198f4d6885ca35
        - $ref: '#/components/parameters/api_key_query'
        - $ref: '#/components/parameters/signature_query'
        - $ref: '#/components/parameters/timestamp_query'
      responses:
        '200':
          description: Asset backup downloaded successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
            video/*:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
              examples:
                illegal_id:
                  summary: Invalid or non-existent asset_id/version_id
                  value:
                    error:
                      message: Illegal id
                missing_version_id:
                  summary: Missing version_id parameter
                  value:
                    error:
                      message: Missing required parameter - version_id
                missing_asset_id:
                  summary: Missing asset_id parameter
                  value:
                    error:
                      message: Missing required parameter - asset_id
                stale_request:
                  summary: Request timestamp is too old
                  value:
                    error:
                      message: Stale request - reported time is {timestamp} which is more than 1 hour ago
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
              examples:
                invalid_signature:
                  summary: Invalid signature with signing string
                  value:
                    error:
                      message: Invalid Signature {signature}. String to sign - '{parameters}'.
                expired_timestamp:
                  summary: Request has expired
                  value:
                    error:
                      message: Request timestamp expired
        '404':
          description: Version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/asset/destroy:
    post:
      x-speakeasy-mcp:
        name: delete-asset
        scopes:
          - admin
        title: Delete Asset
        destructiveHint: true
        idempotentHint: true
      summary: Delete asset by asset ID
      description: |
        Deletes an asset using its immutable asset ID.
      tags:
        - assets
      operationId: destroyByAssetId
      parameters:
        - $ref: '#/components/parameters/cloud_name'
      requestBody:
        description: The asset to delete and related options.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/components-destroy_request'
      responses:
        '200':
          description: Resource successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/components-destroy_response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/{resource_type}/text:
    parameters:
      - $ref: '#/components/parameters/cloud_name'
      - name: resource_type
        in: path
        required: true
        schema:
          type: string
          enum:
            - image
        description: The type of resource to create. Must be "image" for text generation.
    post:
      summary: Create image from text
      description: Dynamically generates an image from a specified text string.
      tags:
        - upload
      operationId: text
      requestBody:
        description: The text content and styling parameters for image generation.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/text_request'
      responses:
        '200':
          description: Text image created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/text_response'
        '400':
          description: Bad request (e.g., missing required parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Authentication error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
  /v1_1/{cloud_name}/transformations:
    get:
      x-speakeasy-mcp:
        name: list-transformations
        scopes:
          - admin
        title: List Transformations
        readOnlyHint: true
        idempotentHint: true
      summary: Lists all transformation definitions in your account, including named transformations
      description: |
        Retrieves a list of all transformations, which can be filtered to show either only named or unnamed transformations.
      tags:
        - transformations
      operationId: listTransformations
      parameters:
        - $ref: '#/components/parameters/cloud_name'
        - name: named
          in: query
          required: false
          schema:
            type: boolean
          description: Whether to return only named (`true`) or unnamed (`false`) transformations. If this parameter isn't included, both named and unnamed transformations will be returned.
        - $ref: '#/components/parameters/max_results_query'
        - $ref: '#/components/parameters/next_cursor_query'
      responses:
        '200':
          description: Transformations retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list_response'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api_error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
